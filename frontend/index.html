<!DOCTYPE html>
<html lang="es">
  <head>
    <script>
      // Detectar preferencia del sistema y localStorage ANTES de que React monte
      (function() {
        try {
          var stored = localStorage.getItem('vizionrd-theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && systemDark)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8" />

    <!-- Primary Meta Tags -->

    <meta name="keywords" content="detallado automotriz, car care, productos automotrices, República Dominicana, VizionRD" />

    <!-- Open Graph / Facebook -->
