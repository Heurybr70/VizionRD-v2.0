name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Crear .env.production desde secrets
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" > frontend/.env.production
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> frontend/.env.production
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> frontend/.env.production
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> frontend/.env.production
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> frontend/.env.production
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> frontend/.env.production
          echo "VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" >> frontend/.env.production

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build project
        run: npm run build
        working-directory: frontend

      - name: Copy .htaccess to dist (if exists)
        run: |
          if [ -f frontend/.htaccess ]; then
            cp frontend/.htaccess frontend/dist/.htaccess
          else
            echo "No frontend/.htaccess found, skipping."
          fi

      - name: List dist output (debug)
        run: |
          echo "== frontend/dist =="
          ls -la frontend/dist || true
          echo "== frontend/dist/assets =="
          ls -la frontend/dist/assets || true
      
      - name: Test FTP port connectivity
        run: |
          echo "Testing port 21..."
          timeout 5 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.FTP_SERVER }}/21" && echo "Port 21 OK" || echo "Port 21 blocked/unreachable"
          echo "Testing port 22..."
          timeout 5 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.FTP_SERVER }}/22" && echo "Port 22 OK" || echo "Port 22 blocked/unreachable"

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /domains/vizionhrd.com/public_html/
          local-dir: frontend/dist/
          dangerous-clean-slate: false

