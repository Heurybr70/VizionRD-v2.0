<!DOCTYPE html>

<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login | VizionRD</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#007fff",
              "background-light": "#f5f7f8",
              "background-dark": "#0f1923",
            },
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }
      .glow-input:focus {
        box-shadow: 0 0 15px rgba(0, 127, 255, 0.4);
        border-color: #007fff;
      }
      .bg-mesh {
        background-color: #0f1923;
        background-image: radial-gradient(
            at 0% 0%,
            hsla(210, 100%, 15%, 1) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            hsla(210, 100%, 10%, 1) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 50% 50%,
            hsla(210, 100%, 5%, 1) 0px,
            transparent 50%
          );
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-6 bg-mesh overflow-hidden"
  >
    <!-- Top Navigation Placeholder (Simplified for Login) -->
    <div class="fixed top-0 left-0 w-full z-50">
      <div
        class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center"
      >
        <div class="flex items-center gap-3 text-white">
          <div class="size-8 text-primary">
            <svg
              fill="none"
              viewbox="0 0 48 48"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M13.8261 30.5736C16.7203 29.8826 20.2244 29.4783 24 29.4783C27.7756 29.4783 31.2797 29.8826 34.1739 30.5736C36.9144 31.2278 39.9967 32.7669 41.3563 33.8352L24.8486 7.36089C24.4571 6.73303 23.5429 6.73303 23.1514 7.36089L6.64374 33.8352C8.00331 32.7669 11.0856 31.2278 13.8261 30.5736Z"
                fill="currentColor"
              ></path>
              <path
                clip-rule="evenodd"
                d="M39.998 35.764C39.9944 35.7463 39.9875 35.7155 39.9748 35.6706C39.9436 35.5601 39.8949 35.4259 39.8346 35.2825C39.8168 35.2403 39.7989 35.1993 39.7813 35.1602C38.5103 34.2887 35.9788 33.0607 33.7095 32.5189C30.9875 31.8691 27.6413 31.4783 24 31.4783C20.3587 31.4783 17.0125 31.8691 14.2905 32.5189C12.0012 33.0654 9.44505 34.3104 8.18538 35.1832C8.17384 35.2075 8.16216 35.233 8.15052 35.2592C8.09919 35.3751 8.05721 35.4886 8.02977 35.589C8.00356 35.6848 8.00039 35.7333 8.00004 35.7388C8.00004 35.739 8 35.7393 8.00004 35.7388C8.00004 35.7641 8.0104 36.0767 8.68485 36.6314C9.34546 37.1746 10.4222 37.7531 11.9291 38.2772C14.9242 39.319 19.1919 40 24 40C28.8081 40 33.0758 39.319 36.0709 38.2772C37.5778 37.7531 38.6545 37.1746 39.3151 36.6314C39.9006 36.1499 39.9857 35.8511 39.998 35.764ZM4.95178 32.7688L21.4543 6.30267C22.6288 4.4191 25.3712 4.41909 26.5457 6.30267L43.0534 32.777C43.0709 32.8052 43.0878 32.8338 43.104 32.8629L41.3563 33.8352C43.104 32.8629 43.1038 32.8626 43.104 32.8629L43.1051 32.865L43.1065 32.8675L43.1101 32.8739L43.1199 32.8918C43.1276 32.906 43.1377 32.9246 43.1497 32.9473C43.1738 32.9925 43.2062 33.0545 43.244 33.1299C43.319 33.2792 43.4196 33.489 43.5217 33.7317C43.6901 34.1321 44 34.9311 44 35.7391C44 37.4427 43.003 38.7775 41.8558 39.7209C40.6947 40.6757 39.1354 41.4464 37.385 42.0552C33.8654 43.2794 29.133 44 24 44C18.867 44 14.1346 43.2794 10.615 42.0552C8.86463 41.4464 7.30529 40.6757 6.14419 39.7209C4.99695 38.7775 3.99999 37.4427 3.99999 35.7391C3.99999 34.8725 4.29264 34.0922 4.49321 33.6393C4.60375 33.3898 4.71348 33.1804 4.79687 33.0311C4.83898 32.9556 4.87547 32.8935 4.9035 32.8471C4.91754 32.8238 4.92954 32.8043 4.93916 32.7889L4.94662 32.777L4.95178 32.7688ZM35.9868 29.004L24 9.77997L12.0131 29.004C12.4661 28.8609 12.9179 28.7342 13.3617 28.6282C16.4281 27.8961 20.0901 27.4783 24 27.4783C27.9099 27.4783 31.5719 27.8961 34.6383 28.6282C35.082 28.7342 35.5339 28.8609 35.9868 29.004Z"
                fill="currentColor"
                fill-rule="evenodd"
              ></path>
            </svg>
          </div>
          <h2 class="text-xl font-bold tracking-tight">VizionRD</h2>
        </div>
        <a
          class="text-primary/80 hover:text-primary text-sm font-medium transition-colors"
          href="#"
          >Soporte</a
        >
      </div>
    </div>
    <!-- Login Container -->
    <main class="w-full max-w-[480px] z-10">
      <div class="glass-card rounded-xl p-8 md:p-12 relative overflow-hidden">
        <!-- Subtle accent glow -->
        <div
          class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"
        ></div>
        <div class="text-center mb-10">
          <h1 class="text-white text-3xl font-bold tracking-tight mb-2">
            Panel de Administración
          </h1>
          <p
            class="text-primary/60 text-sm font-medium uppercase tracking-widest"
          >
            Acceso Seguro
          </p>
        </div>
        <form class="space-y-6">
          <!-- Email Field -->
          <div class="space-y-2">
            <label class="block text-white/80 text-sm font-medium ml-1"
              >Correo Electrónico</label
            >
            <div class="relative group">
              <input
                class="w-full bg-white/5 border border-white/10 rounded-lg h-14 px-4 text-white placeholder:text-white/20 glow-input focus:outline-none focus:ring-0 transition-all font-light"
                placeholder="admin@vizionrd.com"
                type="email"
              />
              <span
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-primary transition-colors"
                >mail</span
              >
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center ml-1">
              <label class="text-white/80 text-sm font-medium"
                >Contraseña</label
              >
              <a
                class="text-primary/60 hover:text-primary text-xs transition-colors"
                href="#"
                >¿Olvidaste tu contraseña?</a
              >
            </div>
            <div class="relative group">
              <input
                class="w-full bg-white/5 border border-white/10 rounded-lg h-14 px-4 text-white placeholder:text-white/20 glow-input focus:outline-none focus:ring-0 transition-all font-light"
                placeholder="••••••••"
                type="password"
              />
              <button
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white/20 hover:text-white transition-colors"
                type="button"
              >
                visibility
              </button>
            </div>
          </div>
          <!-- Primary Login Button -->
          <button
            class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-lg transition-all transform active:scale-[0.98] shadow-lg shadow-primary/20 flex items-center justify-center gap-2 group"
            type="submit"
          >
            <span>Iniciar Sesión</span>
            <span
              class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform"
              >login</span
            >
          </button>
          <!-- Divider -->
          <div class="relative py-4">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-white/10"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
              <span class="bg-transparent px-4 text-white/30 tracking-widest"
                >O continuar con</span
              >
            </div>
          </div>
          <!-- Google Button -->
          <button
            class="w-full bg-transparent border border-white/10 hover:bg-white/5 text-white font-medium h-14 rounded-lg transition-all flex items-center justify-center gap-3"
            type="button"
          >
            <svg class="size-5" viewbox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              ></path>
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              ></path>
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05"
              ></path>
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              ></path>
            </svg>
            <span>Google Workspace</span>
          </button>
        </form>
      </div>
      <!-- Footer -->
      <footer class="mt-8 text-center">
        <p class="text-white/20 text-[10px] uppercase tracking-[0.2em]">
          © 2024 VizionRD Automotive Systems. Reservados todos los derechos.
        </p>
      </footer>
    </main>
    <!-- Aesthetic Decorative Elements -->
    <div
      class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent opacity-30"
    ></div>
    <div
      class="fixed top-20 -left-40 w-80 h-80 bg-primary/5 rounded-full blur-[120px]"
    ></div>
    <div
      class="fixed bottom-20 -right-40 w-80 h-80 bg-primary/5 rounded-full blur-[120px]"
    ></div>
  </body>
</html>
